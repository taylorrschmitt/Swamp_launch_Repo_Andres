; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:pico]
platform                    = https://github.com/maxgerhardt/platform-raspberrypi.git
board                       = rpipico
framework                   = arduino
board_build.core            = earlephilhower
board_build.filesystem_size = 0.5m
 
monitor_speed = 115200
; No monitor_port — let PlatformIO auto-detect so COM port race on reboot is avoided.
; Upload first, then open monitor separately (do not use "Upload and Monitor" together).
 
lib_deps =
    paulstoffregen/OneWire@^2.3.8           ; explicit — required by DallasTemperature
    milesburton/DallasTemperature@^4.0.6
    adafruit/Adafruit BMP5xx Library@^1.0.2
    adafruit/Adafruit BusIO@^1.16.0
 
